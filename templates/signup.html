<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-left">
            <span class="brand">placeholder</span>
            <a class="active" href="/">Home</a>
            <a href="/profile">Profile</a>
            <a href="/employees">Employees</a>
            <a href="/jobs">Jobs</a>
        </div>
        
        <div class="nav-right">
            {% if 'user_id' in session %}
                <a href="/logout" style="background: #ff6b6b; color: #111; font-weight: bold;">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/signup" style="background: #4ecdc4; color: #0d2120; font-weight: bold;">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="login-wrap">
        <h1>Create Account</h1>
        <form id="signup-form">
            <select id="account-type" required style="width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #f5f5f5;">
                <option value="" disabled selected>Select Account Type...</option>
                <option value="candidate">I am looking for a job (Candidate)</option>
                <option value="employer">I am hiring (Employer)</option>
            </select>
            <input type="text" id="display-name" placeholder="Full Name or Company Name" required>
            <input type="text" id="new-username" placeholder="Username" required>
            <input type="password" id="new-password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p id="signup-status"></p>
        <p style="text-align: center; margin-top: 15px;">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>
