<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-left">
            <span class="brand">CoolCats</span>
            <a href="/">Home</a>
            <a class="active" href="/profile">Profile</a>
            <a href="/employees">Employees</a>
            <a href="/jobs">Jobs</a>
        </div>
        <div class="nav-right">
            {% if 'user_id' in session %}
                <a href="/logout" style="background:#ff6b6b;color:#111;font-weight:bold;">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/signup" style="background:#4ecdc4;color:#0d2120;font-weight:bold;">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="wrap"><div class="container">
        <div class="sidebar">
            <div class="profile-card">
                <div class="avatar"></div>
                <h2 id="profile-name">Loading...</h2>
                <p id="profile-subtitle">&mdash;</p>
                <hr>
                <div><strong id="profile-education">&mdash;</strong></div>
            </div>

            <ul class="menu">
                <li><a href="/">Homepage</a></li>
                <li><a class="active" href="/">My Profile</a></li>
                <li><a href="/employees">Employees</a></li>
                <li><a href="/jobs">Jobs</a></li>
            </ul>
        </div>

        <div class="main-content">
            <h1>My Profile</h1>
            <div class="profile-icon" id="profile-initials">--</div>
            <div class="header">
            </div>

            <div class="content-section">
                <h3>Summary</h3>
                <p id="summary-text">Loading profile summary...</p>
            </div>

            <div class="content-section">
                <h3>Skills</h3>
                <p id="skills-text">Loading...</p>
            </div>

            <div class="content-section">
                <h3>Work Experience</h3>
                <div id="work-exp-list">Loading...</div>
            </div>
        </div>
    </div></div>

    <script src="{{ url_for('static', filename='js/nav.js') }}"></script>
    <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
