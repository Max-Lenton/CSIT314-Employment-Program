<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-left">
            <span class="brand">placeholder</span>
            <a class="active" href="/">Home</a>
            <a href="/profile">Profile</a>
            <a href="/employees">Employees</a>
            <a href="/jobs">Jobs</a>
        </div>
        
        <div class="nav-right">
            {% if 'user_id' in session %}
                <a href="/logout" style="background: #ff6b6b; color: #111; font-weight: bold;">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/signup" style="background: #4ecdc4; color: #0d2120; font-weight: bold;">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="login-wrap">
        <h1>Login</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <p id="login-status"></p>
        <p style="text-align: center; margin-top: 15px;">
            Don't have and account? <a href="/signup">Sign up here</a>
        </p>
        <p><a href="/">Back to profile</a></p>
    </div>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
